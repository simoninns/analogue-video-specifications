site_name: Analogue Video Specifications
site_description: Reference material for analogue television systems and LaserDisc formats.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
plugins:
  - search
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
      smart_dollar: false
docs_dir: docs
site_dir: site
exclude_docs: |
  .DS_Store
extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css
  - stylesheets/layout.css
extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - javascripts/katex.js
nav:
  - Home: index.md
  - Television and video formats:
      - ITU-R BT.1700: video_formats/BT-1700-E/BT-1700-E.md
      - ITU-R BT.470-6: video_formats/BT-470-6-1998/BT-470-6-1998.md
      - ITU-R BT.601-5: video_formats/BT-601-5-1995/BT-601-5-1995.md
      - CCIR Report 624-4: video_formats/BT-624-4-1990/BT-624-4-1990.md
      - EBU Tech. 3213-E: video_formats/EBU-Tech-3213-E/EBU-Tech-3213-E.md
      - EBU Tech. 3280-E: video_formats/EBU-Tech-3280-E/EBU-Tech-3280-E.md
      - SMPTE 170M-2004: video_formats/SMPTE-170M-2004/SMPTE-170M-2004.md
      - SMPTE 244M-2003: video_formats/SMPTE-244M-2003/SMPTE-244M-2003.md
  - Video metadata:
      - ANSI/CTA-608-E S-2019 Line 21 Data Services: video_metadata/ANSI-CTA-608-E-S-2019/ANSI-CTA-608-E-S-2019.md
      - EBU Tech. 3209 Performance Specification of Equipment for E.B.U. Insertion Signals: video_metadata/EBU-Tech-3209/EBU-Tech-3209.md
      - IEC 60461:2010 Time and control code: video_metadata/IEC-60461-2010-Time-and-control-code/IEC-60461-2010-Time-and-control-code.md
      - ITU-R BT.1439-1 Measurement methods applicable in the analogue television studio and the overall analogue television system: video_metadata/R-REC-BT-1439-1-2006/R-REC-BT-1439-1-2006.md
      - ITU-T J.63 Insertion of test signals in the field-blanking interval of monochrome and colour television signals: video_metadata/T-REC-J-63-1990/T-REC-J-63-1990.md
      - Vertical Interval Test Signals:
        - Overview: video_metadata/VITS/index.md
        - NTSC VITS Definitions: video_metadata/VITS/NTSC-VITS.md
        - PAL VITS Definitions: video_metadata/VITS/PAL-VITS.md
  - LaserDisc and Laservision:
      - IEC 60856:1986 Laservision PAL: laserdisc/IEC-60856-1986-Laservision-PAL/IEC-60856-1986-Laservision-PAL.md
      - IEC 60856:1986 Amendment 1: laserdisc/IEC-60856-1986-Laservision-PAL-Amendment-1/IEC-60856-1986-Laservision-PAL-Amendment-1.md
      - IEC 60856:1986 Amendment 2: laserdisc/IEC-60856-1986-Laservision-PAL-Amendment-2/IEC-60856-1986-Laservision-PAL-Amendment-2.md
      - IEC 60857:1986 Laservision NTSC: laserdisc/IEC-60857-1986-Laservision-NTSC/IEC-60857-1986-Laservision-NTSC.md
      - IEC 60857:1986 Amendment 1: laserdisc/IEC-60857-1986-Laservision-NTSC-Amendment-1/IEC-60857-1986-Laservision-NTSC-Amendment-1.md
      - IEC 60857:1986 Amendment 2: laserdisc/IEC-60857-1986-Laservision-NTSC-Amendment-2/IEC-60857-1986-Laservision-NTSC-Amendment-2.md
  - VHS:
      - JVC Video Technical Guide VTG82063:
        - Overview: vhs/JVC-Video-Technical-Guide-VTG82063/index.md
        - Section 1 - VHS Basics Technology: vhs/JVC-Video-Technical-Guide-VTG82063/section-1.md
        - Section 2 - Mechanism Description: vhs/JVC-Video-Technical-Guide-VTG82063/section-2.md
        - Section 3 - Video Circuit: vhs/JVC-Video-Technical-Guide-VTG82063/section-3.md
        - Section 4 - Servo Circuit: vhs/JVC-Video-Technical-Guide-VTG82063/section-4.md
        - Section 5 - Microprocessor Systems: vhs/JVC-Video-Technical-Guide-VTG82063/section-5.md
        - Section 6 - Tuner Circuit: vhs/JVC-Video-Technical-Guide-VTG82063/section-6.md
        - Section 7 - Audio Circuit: vhs/JVC-Video-Technical-Guide-VTG82063/section-7.md
        - Section 8 - Appendix: vhs/JVC-Video-Technical-Guide-VTG82063/section-8.md

