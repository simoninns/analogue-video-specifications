schema_version: 2
id: "NTC7-COMPOSITE"
description: "NTSC NTC-7 Composite Insertion Test Signal (VBI Line 17)"
format: "NTSC"
levels_unit: "IRE"
timing_reference: "sync_edge"  # Time positions referenced to H-sync leading edge
y_rise_time_us: 0.20
c_rise_time_us: 0.40

# Overview:
# Recommended placement: VBI line 17, field 1 (not enforced by this VITS definition).
# NTC7 Composite is the NTC-7 (National Television Committee 7) Composite Insertion
# Test Signal for NTSC 525-line video. It is inserted on VBI line 17 of field 1.
# The signal carries a comprehensive set of test waveforms:
#   - 100 IRE white bar (luminance reference)
#   - 2T sine-squared pulse (luminance bandwidth and group delay)
#   - 12.5T modulated pulse (chrominance-to-luminance timing)
#   - Chrominance burst across the staircase zone
#   - 5-step luminance staircase (differential gain and non-linearity)
# Timing is measured from the H-sync leading edge.
# All amplitudes are represented in IRE for schema consistency across formats.
# Burst amplitude convention: amplitude_ire / component_amplitude_ire = carrier peak
# (one-sided, = ½ peak-to-peak). A burst with amplitude_ire N swings ±N IRE around
# its dc_offset_ire, yielding 2N IRE peak-to-peak.

primitives:
  - id: white_reference
    type: "colour_bar"
    label: "100 IRE White Reference Bar"
    window_us: { start: 12.000, end: 30.000 }
    channel: y
    combine: replace
    level_ire: 100.0
    rise_time_us: 0.250

  - id: pulse_2t
    type: "sin_squared_pulse"
    label: "2T Luminance Sine-Squared Pulse"
    window_us: { start: 33.750, end: 34.250 }
    channel: y
    combine: replace
    amplitude_ire: 100.0
    rise_time_us: 0.200

  - id: modulated_y
    type: "sin_squared_pulse"
    label: "12.5T Luminance Component (Y part of modulated pulse)"
    window_us: { start: 35.400, end: 38.600 }
    channel: y
    combine: replace
    amplitude_ire: 50.0
    rise_time_us: 0.200

  - id: modulated_c
    type: "composite_pulse"
    label: "12.5T Chrominance Component (phase-locked to burst)"
    window_us: { start: 35.400, end: 38.600 }
    channel: c
    combine: add
    dc_offset_ire: 0.0
    component_amplitude_ire: 50.0
    rise_time_us: 0.400
    subcarrier_lock_multiple: 1.0
    phase_deg: 0.0

  - id: chrominance_reference
    type: "burst"
    label: "Chrominance Reference Burst (3.58 MHz, 180°)"
    window_us: { start: 42.000, end: 60.000 }
    channel: c
    combine: add
    dc_offset_ire: 0.0
    component_amplitude_ire: 20.0
    rise_time_us: 0.250
    subcarrier_lock_multiple: 1.0
    phase_deg: 180.0

  - id: staircase
    type: "staircase"
    label: "5-Step Luminance Staircase"
    window_us: { start: 46.000, end: 60.000 }
    channel: y
    combine: replace
    top_level_ire: 90.0
    rise_time_us: 0.250
    steps: 5

  - id: staircase_terminus
    type: "colour_bar"
    label: "Reference Level Bar (staircase terminus)"
    window_us: { start: 60.000, end: 62.000 }
    channel: y
    combine: replace
    level_ire: 90.0
    rise_time_us: 0.250

composites:
  - id: modulated_pulse
    mode: parallel
    children: [modulated_y, modulated_c]

render_tree:
  - white_reference
  - pulse_2t
  - modulated_pulse
  - chrominance_reference
  - staircase
  - staircase_terminus
