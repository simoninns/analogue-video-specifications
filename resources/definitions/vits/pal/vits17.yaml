schema_version: 2
id: "VITS17"
description: "PAL VITS Line 17 — Luminance and Chrominance Distortion Test Signal"
format: "PAL"
levels_unit: "mV"
timing_reference: "sync_edge"   # TimingRef=1: all time positions relative to H-sync leading edge
y_rise_time_us: 0.20
c_rise_time_us: 0.40

# Overview:
# Recommended placement: VBI line 17, field 1 (not enforced by this VITS definition).
# VITS 17 is the primary EBU/CCIR insertion test signal for field 1 of 625-line PAL.
# It carries waveforms to measure the key linear distortions of a composite analogue
# video channel within a single scan line. The four test elements are:
#   - 100% white bar (luminance reference level)
#   - 2T sine-squared pulse (luminance group delay and bandwidth)
#   - 20T modulated (chrominance-to-luminance) pulse (Y/C timing and phase)
#   - 5-step luminance staircase (differential gain and linearity)

primitives:
  - id: white_reference
    type: "colour_bar"
    label: "100% White Reference Bar"
    window_us: { start: 12.0, end: 22.0 }
    channel: y
    combine: replace
    level_mv: 700.0
    rise_time_us: 0.200

  - id: pulse_2t
    type: "sin_squared_pulse"
    label: "2T Luminance Sine-Squared Pulse"
    window_us: { start: 25.8, end: 26.2 }
    channel: y
    combine: replace
    amplitude_mv: 700.0
    rise_time_us: 0.200

  - id: modulated_y
    type: "sin_squared_pulse"
    label: "20T Luminance Component (Y part of modulated pulse)"
    window_us: { start: 30.0, end: 34.0 }
    channel: y
    combine: replace
    amplitude_mv: 350.0
    rise_time_us: 0.200

  - id: modulated_c
    type: "composite_pulse"
    label: "20T Chrominance Component (C part of modulated pulse)"
    window_us: { start: 30.0, end: 34.0 }
    channel: c
    combine: add
    dc_offset_mv: 0.0
    component_amplitude_mv: 350.0
    rise_time_us: 0.400
    subcarrier_lock_multiple: 1.0
    phase_deg: 90.0

  - id: staircase
    type: "staircase"
    label: "5-Step Luminance Staircase"
    window_us: { start: 40.0, end: 60.0 }
    channel: y
    combine: replace
    top_level_mv: 700.0
    rise_time_us: 0.235
    steps: 5

  - id: black_reference
    type: "colour_bar"
    label: "End-of-Line Reference Bar"
    window_us: { start: 60.0, end: 62.0 }
    channel: y
    combine: replace
    level_mv: 700.0
    rise_time_us: 0.235

composites:
  - id: modulated_pulse
    mode: parallel
    children: [modulated_y, modulated_c]

render_tree:
  - white_reference
  - pulse_2t
  - modulated_pulse
  - staircase
  - black_reference
