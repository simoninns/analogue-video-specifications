schema_version: 2
id: "uk-national"
description: "PAL VITS Line 19 — UK ITS-1 Insertion Test Signal (IBA/EBU)"
format: "PAL"
levels_unit: "mV"
timing_reference: "sync_edge"  # all time positions measured from the H-sync leading edge
y_rise_time_us: 0.20
c_rise_time_us: 0.40

# Overview:
# Recommended placement: VBI line 19, field 1 (not enforced by this VITS definition).
# VITS 19 is the IBA/EBU UK ITS Line 19 signal, an extension of the VITS standard
# used in UK 625-line PAL broadcasts. It shares the white bar and staircase
# elements of VITS 17 but adds a full-line chrominance reference burst (at PAL
# subcarrier) and repositions the modulated pulse and 2T reference for this UK ITS
# variant. Timing is stored here in microseconds; the 26.000 µs and 30.000 µs pulse
# centres are normalized to clean microsecond positions.
#
# Note: VITS19 appears in AUTO-6D1.FLK (625 D1/PAL) but not in the basic
# composite PAL standard map. Its use implies a D1-capable or extended PAL signal.

primitives:
  - id: white_reference
    type: "colour_bar"
    label: "100% White Reference Bar"
    window_us: { start: 12.0, end: 22.0 }
    channel: y
    combine: replace
    level_mv: 700.0
    rise_time_us: 0.200

  - id: pulse_2t
    type: "sin_squared_pulse"
    label: "2T Luminance Reference Pulse"
    window_us: { start: 25.8, end: 26.2 }
    channel: y
    combine: replace
    amplitude_mv: 700.0
    rise_time_us: 0.200

  - id: modulated_c
    type: "composite_pulse"
    label: "20T Modulated Chrominance Reference Pulse (C part)"
    window_us: { start: 29.0, end: 31.0 }
    channel: c
    combine: add
    dc_offset_mv: 0.0
    component_amplitude_mv: 350.0
    rise_time_us: 0.400
    subcarrier_lock_multiple: 1.0
    phase_deg: 90.0

  - id: modulated_y
    type: "sin_squared_pulse"
    label: "20T Luminance Reference Pulse (Y part of modulated pulse)"
    window_us: { start: 29.0, end: 31.0 }
    channel: y
    combine: replace
    amplitude_mv: 350.0
    rise_time_us: 0.200

  - id: chroma_reference
    type: "burst"
    label: "Full-Line Chrominance Reference Burst (4.433 MHz)"
    window_us: { start: 34.0, end: 60.0 }
    channel: c
    combine: add
    dc_offset_mv: 0.0
    component_amplitude_mv: 70.0
    rise_time_us: 1.000
    subcarrier_lock_multiple: 1.0
    phase_deg: 60.660

  - id: staircase
    type: "staircase"
    label: "5-Step Luminance Staircase"
    window_us: { start: 40.0, end: 60.0 }
    channel: y
    combine: replace
    top_level_mv: 700.0
    rise_time_us: 0.235
    steps: 5

  - id: black_reference
    type: "colour_bar"
    label: "End-of-Line Reference Bar"
    window_us: { start: 60.0, end: 62.0 }
    channel: y
    combine: replace
    level_mv: 700.0
    rise_time_us: 0.235

composites:
  - id: modulated_pulse
    mode: parallel
    children: [modulated_y, modulated_c]

render_tree:
  - white_reference
  - pulse_2t
  - modulated_pulse
  - chroma_reference
  - staircase
  - black_reference
